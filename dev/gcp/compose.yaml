name: gcp-dev

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /config/gcloud
      MYSQL_HOST: proxy
      MYSQL_PORT: 3306
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - gcloud_config:/config/gcloud
      - kube_config:/root/.kube
      - copilot_config:/root/.copilot
    networks:
      - default
    command: sleep infinity

  proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.20.0
    user: root
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      CLOUDSDK_CONFIG: /config/gcloud
    volumes:
      - gcloud_config:/config/gcloud
    networks:
      - default
    command:
      - --address
      - 0.0.0.0
      - --port
      - "3306"
      - --credentials-file=/config/gcloud/application_default_credentials.json
      - ${CLOUDSQL_CONNECTION_NAME}

  adminer:
    image: adminer
    profiles:
      - adminer
    depends_on:
      - proxy
    env_file: .env
    environment:
      # Required to prefill the default host for the local-only Adminer container
      ADMINER_DEFAULT_SERVER: ${MYSQL_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sql.rule=Host(`adminer.localhost`)"
      - "traefik.http.routers.sql.entrypoints=web"
      - "traefik.http.services.sql.loadbalancer.server.port=8080"
    networks:
      - default
      # Required to expose Adminer through the local Traefik network without publishing host ports
      - traefik
    volumes:
      - ./config/adminer/db.php:/var/www/html/plugins-enabled/db.php:ro

  k9s:
    image: derailed/k9s
    env_file: .env
    environment:
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /config/gcloud
    stdin_open: true
    tty: true
    volumes:
      - gcloud_config:/config/gcloud
      - kube_config:/root/.kube
    networks:
      - default

volumes:
  gcloud_config:
  kube_config:
  copilot_config:

networks:
  default:
  traefik:
    external: true
