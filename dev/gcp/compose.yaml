name: gcp-dev

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /config/gcloud
      MYSQL_HOST: proxy
      MYSQL_PORT: 3306
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - gcloud_config:/config/gcloud
      - kube_config:/root/.kube
      - copilot_config:/root/.copilot
    networks:
      - default
    command: sleep infinity

  proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.20.0
    user: root
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      CLOUDSDK_CONFIG: /config/gcloud
    volumes:
      - gcloud_config:/config/gcloud
    networks:
      - default
    command:
      - --address
      - 0.0.0.0
      - --port
      - "3306"
      # Required so Compose can wait for a usable Cloud SQL proxy.
      - --health-check
      - --credentials-file=/config/gcloud/application_default_credentials.json
      - ${CLOUDSQL_CONNECTION_NAME}
    healthcheck:
      test: ["CMD", "/cloud-sql-proxy", "wait", "--max", "3s"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer
    profiles:
      - adminer
    depends_on:
      proxy:
        condition: service_healthy
    env_file: .env
    environment:
      ADMINER_DEFAULT_SERVER: ${MYSQL_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sql.rule=Host(`adminer.localhost`)"
      - "traefik.http.routers.sql.entrypoints=web"
      - "traefik.http.services.sql.loadbalancer.server.port=8080"
    networks:
      - default
      - traefik
    volumes:
      # Required to keep the bundled /var/www/html/adminer.php intact while overriding only our entrypoints.
      - ./config/adminer/index.php:/var/www/html/index.php:ro
      - ./config/adminer/db:/var/www/html/db:ro
    healthcheck:
      # Required so Compose can wait until Adminer is serving HTTP.
      test:
        - CMD
        - php
        - -r
        - exit((int) (@file_get_contents("http://127.0.0.1:8080/") === false));
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  k9s:
    image: derailed/k9s
    profiles:
      - k9s
    env_file: .env
    environment:
      KUBECONFIG: /root/.kube/config
    stdin_open: true
    tty: true
    volumes:
      - kube_config:/root/.kube
    networks:
      - default

volumes:
  gcloud_config:
  kube_config:
  copilot_config:

networks:
  default:
  traefik:
    external: true
