services:
  image:
    build:
      context: .
      dockerfile: Dockerfile

  dev:
    image: dev-gcp:latest
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /config/gcloud
      MYSQL_HOST: proxy-sql
      MYSQL_PORT: 3306
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - gcloud_config:/config/gcloud
      - kube_config:/root/.kube
      - copilot_config:/root/.copilot
    networks:
      - default
    command: sleep infinity

  proxy-sql:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.20.0
    user: root
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      CLOUDSDK_CONFIG: /config/gcloud
    volumes:
      - gcloud_config:/config/gcloud
    networks:
      - default
    command:
      - --address
      - 0.0.0.0
      - --port
      - "3306"
      # Required so Compose can wait for a usable Cloud SQL proxy.
      - --health-check
      - --credentials-file=/config/gcloud/application_default_credentials.json
      - ${CLOUDSQL_CONNECTION_NAME}
    healthcheck:
      test: ["CMD", "/cloud-sql-proxy", "wait", "--max", "3s"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  proxy-gke:
    image: dev-gcp:latest
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/gcloud/application_default_credentials.json
      KUBECONFIG: /root/.kube/config
      CLOUDSDK_CONFIG: /config/gcloud
    volumes:
      - gcloud_config:/config/gcloud
      - kube_config:/root/.kube
    networks:
      - default
    # Required so k9s can reach the Kubernetes API via this in-network proxy without needing the GKE auth plugin.
    command:
      - sh
      - -lc
      - kubectl proxy --address=0.0.0.0 --port=8001 --accept-hosts='.*'
    healthcheck:
      test:
        - CMD
        # Required so health reflects whether kubectl can authenticate to the cluster, not just whether the local proxy is listening.
        - kubectl
        - get
        - --raw=/version
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer
    profiles:
      - adminer
    depends_on:
      proxy-sql:
        condition: service_healthy
    env_file: .env
    environment:
      MYSQL_HOST: proxy-sql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sql.rule=Host(`adminer.localhost`)"
      - "traefik.http.routers.sql.entrypoints=web"
      - "traefik.http.services.sql.loadbalancer.server.port=8080"
    networks:
      - default
      - traefik
    volumes:
      # Required to keep the bundled /var/www/html/adminer.php intact while overriding only our entrypoints.
      - ./config/adminer/index.php:/var/www/html/index.php:ro
      - ./config/adminer/db:/var/www/html/db:ro
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - exit((int) (@file_get_contents("http://127.0.0.1:8080/") === false));
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  k9s:
    image: derailed/k9s
    profiles:
      - k9s
    depends_on:
      proxy-gke:
        condition: service_healthy
    env_file: .env
    environment:
      KUBECONFIG: /config/k9s/kubeconfig-proxy.yaml
      TERM: xterm-256color
      COLORTERM=: ruecolor
      XDG_CONFIG_HOME: /config
    stdin_open: true
    tty: true
    volumes:
      - ./config/k9s:/config/k9s
    networks:
      - default

volumes:
  gcloud_config:
  kube_config:
  copilot_config:

networks:
  default:
  traefik:
    external: true
