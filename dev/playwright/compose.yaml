name: playwright

services:
  dev:
    image: mcr.microsoft.com/playwright:v1.59.0-jammy
    command: sleep infinity
    init: true
    # Required so Chromium has enough shared memory inside the container.
    ipc: host
    volumes:
      - .:/workspace:cached
      - node_modules:/workspace/node_modules
    working_dir: /workspace

volumes:
  node_modules:
