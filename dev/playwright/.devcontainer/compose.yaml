name: playwright_devcontainer

services:
  workspace:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    command: sleep infinity
    init: true
    # Required so Chromium has enough shared memory inside the container.
    ipc: host
    volumes:
      - ..:/workspaces/playwright:cached
      # Keep container-built dependencies off the host and preserve Linux-compatible binaries.
      - node_modules:/workspaces/playwright/node_modules
    working_dir: /workspaces/playwright

volumes:
  node_modules:
