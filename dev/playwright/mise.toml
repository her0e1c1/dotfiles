# Mirrors the devcontainer's Node-based Playwright development environment locally.
[tools]
node = "lts"
# Required to match the devcontainer GitHub CLI feature.
"aqua:cli/cli" = "latest"
# Required to match the devcontainer Copilot CLI feature.
"aqua:github/copilot-cli" = "latest"

[tasks.setup]
description = "Install local dependencies like the devcontainer postCreateCommand"
# Required because local Playwright runs need browser binaries outside the devcontainer image.
run = [
  "npm ci",
  "npx playwright install",
]

[tasks.clean]
description = "Remove local install and Playwright-generated artifacts"
run = """
rm -rf \
  node_modules \
  test-results \
  .playwright-cli \
  .playwright-mcp \
  generated.spec.ts \
  playwright-report
"""
